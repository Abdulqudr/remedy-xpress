kind = "web"
previewPath = "/"
title = "Remedy Xpress"
version = "1.0.0"
id = "artifacts/remedy-xpress"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20222

[services.development]
run = "pnpm --filter @workspace/remedy-xpress run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remedy-xpress", "run", "build" ]
publicDir = "artifacts/remedy-xpress/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20222"
BASE_PATH = "/"
